name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: cf-worker
      - name: Deploy to Cloudflare Workers
        run: npx --yes wrangler@4 deploy worker.js --name yourcommunity-api --compatibility-date 2025-04-01 --compatibility-flags nodejs_compat
        working-directory: cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
